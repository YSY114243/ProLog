name: internlog
description: "InternLog – Professional Log for Civil Engineering Internship Students."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  supabase_flutter: ^2.8.4
  pdf: ^3.11.1
  printing: ^5.13.2
  http: ^1.6.0
  fl_chart: ^0.69.0
  image_picker: ^1.2.1
  url_launcher: ^6.2.5
  image: ^4.5.4
  font_awesome_flutter: ^11.0.0
  speech_to_text: ^7.0.0
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.5.5
  file_picker: ^3.0.4
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/iau_logo.svg
