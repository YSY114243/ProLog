<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="InternLog">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>InternLog</title>
  <link rel="manifest" href="manifest.json">

  <!-- PayPal JS SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=Ae7xARZuVt90cXuMSC7Bdri_bcoxPUSKJ6kIxz2mloWwMLFURhaFYi1zEg5dpp3zwo_x37h878AUKpqC&currency=USD"></script>
  <script>
    function renderPayPalButton(containerId, amount, onSuccess, onError, onCancel) {
      // Clear container in case of re-render
      document.getElementById(containerId).innerHTML = '';
      
      paypal.Buttons({
        createOrder: function(data, actions) {
          return actions.order.create({
            purchase_units: [{
              amount: {
                value: amount
              }
            }]
          });
        },
        onApprove: function(data, actions) {
          return actions.order.capture().then(function(details) {
            onSuccess(details);
          });
        },
        onError: function(err) {
          onError(err.toString());
        },
        onCancel: function(data) {
          onCancel(data);
        }
      }).render('#' + containerId);
    }
  <!-- Paddle JS SDK -->
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script>
    function initPaddle(token) {
      Paddle.Initialize({ 
        token: token,
        environment: 'production' 
      });
    }

    function openPaddleCheckout(priceId, onSuccess, onClosed) {
      Paddle.Checkout.open({
        items: [{ priceId: priceId, quantity: 1 }],
        settings: {
          successCallback: function(data) {
            onSuccess(data);
          },
          closeCallback: function(data) {
            onClosed(data);
          }
        }
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
